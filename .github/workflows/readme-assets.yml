# Generates stats cards and contribution snake as committed SVG files.
# Public github-readme-stats.vercel.app often returns 503; local assets are reliable.

name: Update README assets

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=jonathonb21&show_icons=true&theme=tokyonight&hide_border=true
          path: assets/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=jonathonb21&layout=compact&theme=tokyonight&hide_border=true&langs_count=8
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jonathonb21
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Copy snake into assets
        run: cp dist/github-contribution-grid-snake.svg assets/snake.svg

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          git commit -m "Update README assets" || exit 0
          git push
